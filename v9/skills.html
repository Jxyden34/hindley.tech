<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Skills | Jayden Hindley</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Your main website styling -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Skill-grid styling -->
    <link rel="stylesheet" href="css/skills.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/favicon-192.png">
    <link rel="stylesheet" href="css/terminal.css">
</head>

<body>
    <!-- NAV stays identical to other pages -->
    <div class="nav-wrapper">
        <nav>
            <div class="nav-left">
                <div class="nav-logo">JH</div>
                <div class="nav-title">hindley.<span>tech</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/skills" class="active">Skills</a></li>
                <li><a href="/project">Projects</a></li>
                <li><a href="/security">Security</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </div>

    <div class="grain-overlay"></div>

    <main>
        <section class="container animate-fade-up" style="animation-delay: 0.1s;">
            <h1 class="page-title">My Skills</h1>
            <p class="page-subtitle">Click a skill to see tools I use, where I use them, and why they matter.</p>

            <!-- Only this panel contains the skills -->
            <div id="skills-grid">
                <div class="bubble" data-name="Proxmox"><img src="/images/skills/proxmox.png" alt="Proxmox"></div>
                <div class="bubble" data-name="Docker"><img src="/images/skills/docker.png" alt="Docker"></div>
                <div class="bubble" data-name="Linux"><img src="/images/skills/linux.png" alt="Linux"></div>
                <div class="bubble" data-name="PowerShell"><img src="/images/skills/powershell.png" alt="PowerShell">
                </div>
                <div class="bubble" data-name="Python"><img src="/images/skills/python.png" alt="Python"></div>
                <div class="bubble" data-name="Grafana"><img src="/images/skills/grafana.png" alt="Grafana"></div>
                <div class="bubble" data-name="InfluxDB"><img src="/images/skills/influxdb.png" alt="InfluxDB"></div>
                <div class="bubble" data-name="FastAPI"><img src="/images/skills/fastapi.png" alt="FastAPI"></div>
                <div class="bubble" data-name="Node.js"><img src="/images/skills/nodejs.png" alt="Node.js"></div>
                <div class="bubble" data-name="JavaScript"><img src="/images/skills/javascript.png" alt="JavaScript">
                </div>
                <div class="bubble" data-name="iDRAC"><img src="/images/skills/idrac.png" alt="iDRAC"></div>
                <div class="bubble" data-name="Redfish"><img src="/images/skills/redfish.png" alt="Redfish"></div>
                <div class="bubble" data-name="Uptime Kuma"><img src="/images/skills/kuma.png" alt="Uptime Kuma"></div>
                <div class="bubble" data-name="Tailscale"><img src="/images/skills/Tailscale.png" alt="Tailscale"></div>
                <div class="bubble" data-name="Cloudflare"><img src="/images/skills/cloudflare.png" alt="Cloudflare">
                </div>
                <div class="bubble" data-name="Git"><img src="/images/skills/git.png" alt="Git"></div>
                <div class="bubble" data-name="Nginx"><img src="/images/skills/nginx.png" alt="Nginx"></div>
                <div class="bubble" data-name="Apache"><img src="/images/skills/apache.png" alt="Apache"></div>
                <div class="bubble" data-name="Raspberry Pi"><img src="/images/skills/raspbearrypi.png"
                        alt="Raspberry Pi"></div>
                <div class="bubble" data-name="OpenWebUI"><img src="/images/skills/openwebui.png" alt="OpenWebUI"></div>
                <div class="bubble" data-name="Ollama"><img src="/images/skills/ollama.png" alt="Ollama"></div>
                <div class="bubble" data-name="ComfyUI"><img src="/images/skills/comfyui.png" alt="ComfyUI"></div>
                <div class="bubble" data-name="Ansible"><img src="/images/skills/ansible.png" alt="Ansible"></div>
                <div class="bubble" data-name="Bash"><img src="/images/skills/bash.png" alt="Bash"></div>
                <div class="bubble" data-name="Systemd"><img src="/images/skills/systemd.png" alt="Systemd"></div>
                <div class="bubble" data-name="DNS"><img src="/images/skills/dns.png" alt="DNS"></div>
                <div class="bubble" data-name="SSL / TLS"><img src="/images/skills/ssl.png" alt="SSL"></div>
                <div class="bubble" data-name="Telegram Bots"><img src="/images/skills/telegrambot.png"
                        alt="Telegram Bots"></div>
                <div class="bubble" data-name="PM2"><img src="/images/skills/pm2.png" alt="PM2"></div>
                <div class="bubble" data-name="Azure AD"><img src="/images/skills/azuread.png" alt="Azure AD"></div>
                <div class="bubble" data-name="Microsoft 365"><img src="/images/skills/m365.png" alt="M365"></div>
                <div class="bubble" data-name="VPN"><img src="/images/skills/vpn.png" alt="VPN"></div>
                <div class="bubble" data-name="Firewall"><img src="/images/skills/firewall.png" alt="Firewall"></div>
                <div class="bubble" data-name="DHCP"><img src="/images/skills/dhcp.png" alt="DHCP"></div>
                <div class="bubble" data-name="Ngrok"><img src="/images/skills/ngrok.png" alt="Ngrok"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <span>© <span id="year"></span> hindley.tech</span>
            <span>Still learning, always experimenting.</span>
        </div>
    </footer>

    <!-- Modal for Skill Details -->
    <div id="skill-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <h2 id="modal-title">Skill Name</h2>
            <p id="modal-desc">Skill description goes here.</p>
        </div>
    </div>

    <!-- Chatbot -->
    <button id="chatbot-toggle" aria-label="Open AI chat">
        💬
    </button>

    <div id="chatbot-container">
        <div id="chatbot-header">Chat with Jayden's AI</div>
        <div id="chatbot-messages"></div>
        <div id="chatbot-input">
            <input type="text" id="user-input" placeholder="Type a message..." />
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script src="js/chatbot.js"></script>

    <script src="js/skills.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/konami.js"></script>
    <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>

</html>
